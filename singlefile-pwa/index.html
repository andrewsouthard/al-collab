<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SingleFile PWA</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/icon-192.png">
<meta name="theme-color" content="#1a1a2e">
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --text: #eaeaea;
    --text-dim: #8899aa;
    --radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--surface);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    border-bottom: 1px solid #ffffff15;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
    white-space: nowrap;
  }

  .url-bar {
    flex: 1;
    display: flex;
    gap: 8px;
    min-width: 200px;
  }

  .url-bar input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid #ffffff20;
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .url-bar input:focus {
    border-color: var(--accent);
  }

  .url-bar input::placeholder {
    color: var(--text-dim);
  }

  button {
    padding: 8px 16px;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  button:hover { opacity: 0.9; }
  button:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    color: white;
  }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
  }

  .btn-success {
    background: #27ae60;
    color: white;
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 12px;
    overflow: hidden;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-dim);
    min-height: 24px;
  }

  .status-bar .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--text-dim);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }

  .status-bar .spinner.active { display: inline-block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .status-bar .error { color: var(--accent); }
  .status-bar .success { color: #27ae60; }

  .iframe-container {
    flex: 1;
    border: 1px solid #ffffff10;
    border-radius: var(--radius);
    overflow: hidden;
    background: white;
    min-height: 200px;
    position: relative;
  }

  .iframe-container iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .iframe-container .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 14px;
    pointer-events: none;
  }

  .actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .result-info {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 12px;
    font-size: 13px;
    line-height: 1.5;
    display: none;
    max-height: 120px;
    overflow-y: auto;
  }

  .result-info.visible { display: block; }

  .result-info dt { color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .result-info dd { color: var(--text); margin-bottom: 6px; word-break: break-all; }

  @media (max-width: 600px) {
    header { flex-direction: column; align-items: stretch; }
    .url-bar { min-width: auto; }
  }
</style>
</head>
<body>
  <header>
    <h1>⬡ SingleFile PWA</h1>
    <div class="url-bar">
      <input type="url" id="urlInput" placeholder="https://example.com/page" value="https://example.com">
      <button id="loadBtn" class="btn-primary">Load</button>
    </div>
  </header>

  <main>
    <div class="status-bar">
      <span class="spinner" id="spinner"></span>
      <span id="statusText">Enter a URL and click Load</span>
    </div>

    <div class="iframe-container">
      <div class="placeholder" id="placeholder">Page will appear here</div>
      <iframe id="proxyFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    </div>

    <div class="actions">
      <button id="saveBtn" class="btn-success" disabled>💾 Save as Single File</button>
      <button id="downloadBtn" class="btn-secondary" style="display:none">⬇ Download</button>
    </div>

    <div class="result-info" id="resultInfo"></div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
